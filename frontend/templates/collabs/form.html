{% extends "base.html" %}
{% block title %}{% if action == 'create' %}콜라보 등록{% else %}콜라보 수정{% endif %}{% endblock %}
{% block page_title %}{% if action == 'create' %}콜라보 등록{% else %}콜라보 수정{% endif %}{% endblock %}

{% block content %}
<div class="max-w-lg">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        {% if error %}<div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{{ error }}</div>{% endif %}
        <form action="/collabs/{% if action == 'edit' %}{{ collab.collab_id }}/edit{% else %}new{% endif %}" method="post" class="space-y-5">
            <div class="form-group">
                <label class="form-label">구단 <span class="text-red-500">*</span></label>
                <select name="club_id" required class="form-select">
                    <option value="">구단 선택</option>
                    {% for club in clubs %}
                    <option value="{{ club.club_id }}" {% if collab and collab.club_id == club.club_id %}selected{% endif %}>{{ club.club_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">콜라보명 <span class="text-red-500">*</span></label>
                <input type="text" name="collab_name" required value="{{ collab.collab_name if collab else '' }}" class="form-input" placeholder="예: 2024 홈킷">
            </div>
            <div class="form-group">
                <label class="form-label">상태</label>
                <select name="status" class="form-select">
                    <option value="활성" {% if not collab or collab.status == '활성' %}selected{% endif %}>활성</option>
                    <option value="비활성" {% if collab and collab.status == '비활성' %}selected{% endif %}>비활성</option>
                </select>
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="btn-primary flex-1">{% if action == 'create' %}등록{% else %}저장{% endif %}</button>
                <a href="/collabs" class="btn-secondary flex-1 text-center">취소</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
