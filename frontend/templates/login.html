<!DOCTYPE html>
<html lang="ko" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 마킹키트 관리시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="h-full bg-gradient-to-br from-gray-900 via-blue-950 to-gray-900 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- 로고 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-500 rounded-2xl mb-4 shadow-lg">
                <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">마킹키트 관리시스템</h1>
            <p class="text-gray-400 text-sm mt-1">스포츠 의류 생산·물류 플랫폼</p>
        </div>

        <!-- 로그인 카드 -->
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            {% if request.query_params.get('error') %}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2">
                <svg class="w-4 h-4 text-red-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
                <span class="text-sm text-red-700">아이디 또는 비밀번호가 올바르지 않습니다.</span>
            </div>
            {% endif %}

            <form action="/login" method="post" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">아이디</label>
                    <input type="text" name="username" required autofocus
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-800 placeholder-gray-400"
                        placeholder="아이디를 입력하세요">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">비밀번호</label>
                    <input type="password" name="password" required
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-800 placeholder-gray-400"
                        placeholder="비밀번호를 입력하세요">
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition-colors duration-200 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
                    로그인
                </button>
            </form>

            <!-- 데모 계정 안내 -->
            <div class="mt-6 p-4 bg-gray-50 rounded-xl">
                <p class="text-xs font-medium text-gray-500 mb-2">데모 계정</p>
                <div class="space-y-1 text-xs text-gray-600">
                    <div class="flex justify-between"><span>관리자</span><code class="text-blue-600">admin / admin1234</code></div>
                    <div class="flex justify-between"><span>매니저</span><code class="text-blue-600">manager / manager1234</code></div>
                    <div class="flex justify-between"><span>직원</span><code class="text-blue-600">staff / staff1234</code></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
