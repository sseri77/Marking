{% if total_pages > 1 %}
<div class="px-5 py-4 border-t border-gray-100 flex items-center justify-between">
    <span class="text-sm text-gray-500">{{ total }}개 중 {{ items|length }}개 표시</span>
    <div class="flex gap-1">
        {% if page > 1 %}
        <a href="?page={{ page-1 }}{% if q %}&q={{ q }}{% endif %}" class="px-3 py-1.5 text-sm border border-gray-200 rounded-lg hover:bg-gray-50">이전</a>
        {% endif %}
        {% for p in range(1, total_pages+1) %}
        <a href="?page={{ p }}{% if q %}&q={{ q }}{% endif %}"
           class="px-3 py-1.5 text-sm border rounded-lg {% if p == page %}bg-blue-600 text-white border-blue-600{% else %}border-gray-200 hover:bg-gray-50{% endif %}">
           {{ p }}
        </a>
        {% endfor %}
        {% if page < total_pages %}
        <a href="?page={{ page+1 }}{% if q %}&q={{ q }}{% endif %}" class="px-3 py-1.5 text-sm border border-gray-200 rounded-lg hover:bg-gray-50">다음</a>
        {% endif %}
    </div>
</div>
{% endif %}
