{% extends "base.html" %}
{% block title %}{% if action == 'create' %}선수 등록{% else %}선수 수정{% endif %}{% endblock %}
{% block page_title %}{% if action == 'create' %}선수 등록{% else %}선수 수정{% endif %}{% endblock %}

{% block content %}
<div class="max-w-lg">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        {% if error %}<div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{{ error }}</div>{% endif %}
        <form action="/players/{% if action == 'edit' %}{{ player.player_id }}/edit{% else %}new{% endif %}" method="post" class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div class="form-group">
                    <label class="form-label">구단 <span class="text-red-500">*</span></label>
                    <select name="club_name" required class="form-select" id="club-select" onchange="filterCollabs()">
                        <option value="">선택</option>
                        {% for club in clubs %}
                        <option value="{{ club.club_name }}" {% if player and player.club_name == club.club_name %}selected{% endif %}>{{ club.club_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">콜라보 <span class="text-red-500">*</span></label>
                    <select name="collab_name" required class="form-select" id="collab-select">
                        <option value="">선택</option>
                        {% for c in collabs %}
                        <option value="{{ c.collab_name }}" {% if player and player.collab_name == c.collab_name %}selected{% endif %}>{{ c.collab_name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="form-group">
                    <label class="form-label">선수명 <span class="text-red-500">*</span></label>
                    <input type="text" name="player_name" required value="{{ player.player_name if player else '' }}" class="form-input" placeholder="홍길동">
                </div>
                <div class="form-group">
                    <label class="form-label">등번호 <span class="text-red-500">*</span></label>
                    <input type="text" name="player_number" required value="{{ player.player_number if player else '' }}" class="form-input" placeholder="10" inputmode="numeric">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">상태</label>
                <select name="status" class="form-select">
                    <option value="활성" {% if not player or player.status == '활성' %}selected{% endif %}>활성</option>
                    <option value="비활성" {% if player and player.status == '비활성' %}selected{% endif %}>비활성</option>
                </select>
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="btn-primary flex-1">{% if action == 'create' %}등록{% else %}저장{% endif %}</button>
                <a href="/players" class="btn-secondary flex-1 text-center">취소</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
