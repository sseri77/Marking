{% extends "base.html" %}
{% block title %}{% if action == 'create' %}구단 등록{% else %}구단 수정{% endif %}{% endblock %}
{% block page_title %}{% if action == 'create' %}구단 등록{% else %}구단 수정{% endif %}{% endblock %}

{% block content %}
<div class="max-w-lg">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        {% if error %}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{{ error }}</div>
        {% endif %}
        <form action="/clubs/{% if action == 'edit' %}{{ club.club_id }}/edit{% else %}new{% endif %}" method="post" class="space-y-5">
            <div class="form-group">
                <label class="form-label">구단명 <span class="text-red-500">*</span></label>
                <input type="text" name="club_name" required value="{{ club.club_name if club else '' }}" class="form-input" placeholder="예: FC서울">
            </div>
            <div class="form-group">
                <label class="form-label">상태</label>
                <select name="status" class="form-select">
                    <option value="활성" {% if not club or club.status == '활성' %}selected{% endif %}>활성</option>
                    <option value="비활성" {% if club and club.status == '비활성' %}selected{% endif %}>비활성</option>
                </select>
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="btn-primary flex-1">
                    {% if action == 'create' %}등록{% else %}저장{% endif %}
                </button>
                <a href="/clubs" class="btn-secondary flex-1 text-center">취소</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
